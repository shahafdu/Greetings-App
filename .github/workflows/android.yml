name: Build Android APK

# Builds the debug APK on GitHub's servers (no local machine needed) and publishes it to a
# GitHub Release you can download+install directly on your phone. The committed debug keystore
# gives every build the same SHA-1 registered in Google Cloud, so Google Sign-In keeps working.

on:
  push:
    branches: [main, feature/android-phase2]
  workflow_dispatch: # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write # needed to publish the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages (compileSdk 36)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install dependencies (runs postinstall patches)
        run: npm install

      - name: Build web and sync to Android
        run: |
          npm run build
          npx cap sync android

      - name: Build signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --console=plain -PversionCode=${{ github.run_number }} -PversionName=1.0.${{ github.run_number }}

      - name: Stage APK
        run: cp android/app/build/outputs/apk/release/app-release.apk greetings.apk

      - name: Publish to "android-latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "Build ${{ github.run_number }}"
          body: "Signed release APK · build ${{ github.run_number }} · ${{ github.sha }} on ${{ github.ref_name }}."
          prerelease: false
          make_latest: "true"
          files: greetings.apk
